io:
  data_path: 'Data/'
  model_path: 'weights/MAPEM/U_MAPEM_JFB_18it.pth'
  output_path: 'output/demo'
  experiment_name: 'JFU_MAPEM'


eval:
  save_masks : True
  verbose : True

# MODEL TRAINING PARAMETERS
model:
  name: 'U_MAPEM_JFB'
  pretrained: False
  beta: 0.5
  n_iter: 18


image_metadata:
  size: [128,128,128]
  spacing: [0.47952,0.47952,0.47952]

proj_metadata:
  size: [128,128]
  spacing: [0.47952,0.47952]
  n_angles: 120
  radii: 28

training:
  batch_size: 1
  num_workers: 64
  epochs: 60
  learning_rate: 0.0001 
  patience: 100
  device: cuda
  optimizer: 'AdamW'
  loss_function: 'MSELoss' 

